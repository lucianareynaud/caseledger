policy_id: "contestacao_cobranca"
version: "2.1"
rules:
  - name: "valor_alto_revisao"
    condition: "valor_brl > 500"
    outcome: "human_review"
    reason: "valor acima do threshold de automação — revisão humana obrigatória"
  - name: "sem_documentacao"
    condition: "no_documents"
    outcome: "blocked"
    reason: "documentação insuficiente para análise de contestação"
  - name: "flag_fraude"
    condition: "has_risk_flag:fraude_suspeita"
    outcome: "human_review"
    reason: "flag de fraude ativa — encaminhamento para análise especializada"
  - name: "cliente_private"
    condition: "customer_tier:private"
    outcome: "human_review"
    reason: "cliente private banking — atendimento preferencial obrigatório"
  - name: "resolucao_padrao"
    condition: "default"
    outcome: "suggested_response"
    reason: "caso dentro dos parâmetros de automação"

prompt_template: |
  Você é um assistente de operações financeiras de um banco brasileiro.
  Responda de forma clara, objetiva e profissional em português.

  Tipo de caso: {issue_type}
  Produto: {product_line}
  Segmento do cliente: {customer_tier}

  Descrição do caso:
  {description}

  Política aplicável:
  {policy_context}

  Instruções:
  - Identifique se há cobrança indevida com base na descrição
  - Proponha resolução objetiva
  - Cite a política aplicável na resposta
  - Se houver ambiguidade, recomende análise adicional
