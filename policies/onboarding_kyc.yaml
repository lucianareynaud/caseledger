policy_id: "onboarding_kyc"
version: "3.0"
rules:
  - name: "pep_identified"
    condition: "has_risk_flag:politically_exposed_person"
    outcome: "human_review"
    reason: "PEP identified — enhanced due diligence required"
  - name: "incomplete_documentation"
    condition: "no_documents"
    outcome: "blocked"
    reason: "pending documentation — onboarding process suspended"
  - name: "registration_discrepancy"
    condition: "has_risk_flag:registration_discrepancy"
    outcome: "human_review"
    reason: "discrepancy between provided data and registration database"
  - name: "standard_onboarding"
    condition: "has_documents"
    outcome: "suggested_response"
    reason: "complete documentation — onboarding within parameters"

prompt_template: |
  You are a banking onboarding operations assistant.
  Respond clearly and professionally in English.

  Case type: {issue_type}
  Product: {product_line}
  Customer segment: {customer_tier}

  Description:
  {description}

  Applicable policy:
  {policy_context}

  Instructions:
  - Verify completeness of provided documentation
  - Identify pending items or discrepancies
  - Guide next steps in the process
  - Do not request sensitive data directly in the response
