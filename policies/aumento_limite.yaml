policy_id: "aumento_limite"
version: "1.3"
rules:
  - name: "restricao_cadastral"
    condition: "has_risk_flag:restricao_cadastral"
    outcome: "blocked"
    reason: "restrição cadastral ativa — solicitação bloqueada automaticamente"
  - name: "flag_inadimplencia"
    condition: "has_risk_flag:inadimplencia_ativa"
    outcome: "blocked"
    reason: "inadimplência ativa — não elegível para aumento"
  - name: "cliente_novo"
    condition: "has_risk_flag:conta_recente"
    outcome: "human_review"
    reason: "conta com menos de 6 meses — análise manual de elegibilidade"
  - name: "valor_alto"
    condition: "valor_brl > 10000"
    outcome: "human_review"
    reason: "aumento acima de R$10.000 — aprovação gerencial necessária"
  - name: "aumento_padrao"
    condition: "default"
    outcome: "suggested_response"
    reason: "solicitação dentro dos parâmetros pré-aprovados"

prompt_template: |
  Você é um assistente de operações financeiras de um banco brasileiro.
  Responda de forma clara e profissional em português.

  Tipo de caso: {issue_type}
  Produto: {product_line}
  Segmento do cliente: {customer_tier}

  Descrição:
  {description}

  Política aplicável:
  {policy_context}

  Instruções:
  - Avalie a elegibilidade com base na política
  - Se elegível, informe próximos passos
  - Se inelegível, explique o motivo com clareza
  - Não faça promessas sobre valores ou prazos específicos
