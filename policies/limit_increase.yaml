policy_id: "limit_increase"
version: "1.3"
rules:
  - name: "credit_restriction"
    condition: "has_risk_flag:credit_restriction"
    outcome: "blocked"
    reason: "active credit restriction — request automatically blocked"
  - name: "delinquency_flag"
    condition: "has_risk_flag:active_delinquency"
    outcome: "blocked"
    reason: "active delinquency — not eligible for increase"
  - name: "new_customer"
    condition: "has_risk_flag:recent_account"
    outcome: "human_review"
    reason: "account less than 6 months old — manual eligibility analysis"
  - name: "high_value"
    condition: "amount_brl > 10000"
    outcome: "human_review"
    reason: "increase above R$10,000 — managerial approval required"
  - name: "standard_increase"
    condition: "default"
    outcome: "suggested_response"
    reason: "request within pre-approved parameters"

prompt_template: |
  You are a financial operations assistant for a Brazilian bank.
  Respond clearly and professionally in English.

  Case type: {issue_type}
  Product: {product_line}
  Customer segment: {customer_tier}

  Description:
  {description}

  Applicable policy:
  {policy_context}

  Instructions:
  - Assess eligibility based on policy
  - If eligible, inform next steps
  - If ineligible, explain reason clearly
  - Do not make promises about specific amounts or timeframes
